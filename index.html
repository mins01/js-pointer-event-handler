                    'event.type':event.type,
                    'pointers.size':peh1.pointers.size,
                    'maxActivePointers':peh1.maxActivePointers,
                    'downAt':peh1.downAt,
                    'target.id':peh1.target.id,
                    'event.currentTarget':event.currentTarget.constructor.name+"#"+event.currentTarget.id,
                    'xys':[...peh1.pointers.values()].map(r=> [r.pointerType+":"+r.clientX.toFixed(2)+","+r.clientY.toFixed(2)]),
                }
                output.textContent = JSON.stringify(json,null,2)
            }

            target.addEventListener('pointerdown.peh',(event)=>{
                showOutput(event)
                const detail = event.detail;
                console.log(event.type,detail.pointerEventHandler,[...detail.pointerEventHandler.pointers.values()],detail.metrics,detail.totalMetrics);
            })
            target.addEventListener('pointermove.peh',(event)=>{
                showOutput(event)
                const detail = event.detail;
                console.log(event.type,detail.pointerEventHandler,[...detail.pointerEventHandler.pointers.values()],detail.metrics,detail.totalMetrics);
            })
            target.addEventListener('pointerup.peh',(event)=>{
                showOutput(event)
                const detail = event.detail;
                console.log(event.type,detail.pointerEventHandler,[...detail.pointerEventHandler.pointers.values()],detail.metrics,detail.totalMetrics);
            })
            target.addEventListener('pointercancel.peh',(event)=>{
                showOutput(event)
                const detail = event.detail;
                console.log(event.type,detail.pointerEventHandler,[...detail.pointerEventHandler.pointers.values()],detail.metrics,detail.totalMetrics);
            })
            target.addEventListener('pointerleave.peh',(event)=>{ // 발생 안한다. 내부에서 처리 안함.
                showOutput(event)
                const detail = event.detail;
                console.log(event.type,detail.pointerEventHandler,[...detail.pointerEventHandler.pointers.values()],detail.metrics,detail.totalMetrics);
            })

            target.addEventListener('gotpointercapture.peh',(event)=>{
                showOutput(event)
                const detail = event.detail;
                console.log(event.type,detail.pointerEventHandler,[...detail.pointerEventHandler.pointers.values()],detail.metrics,detail.totalMetrics);
            })

            target.addEventListener('lostpointercapture.peh',(event)=>{
                showOutput(event)
                const detail = event.detail;
                console.log(event.type,detail.pointerEventHandler,[...detail.pointerEventHandler.pointers.values()],detail.metrics,detail.totalMetrics);
            })

            target.addEventListener('pointerend.peh',(event)=>{ // pointerevent 흐름이 종료 됨. pointerup, pointercancel, lostpointercapture 때 발생함(이들 이벤트와 같은 detail을 가짐)
                showOutput(event)
                const detail = event.detail;
                console.log(event.type,detail.pointerEventHandler,[...detail.pointerEventHandler.pointers.values()],detail.metrics,detail.totalMetrics);
            })


            target.addEventListener('multipointerdown.peh',(event)=>{
                showOutput(event)
                const detail = event.detail;
                console.log(event.type,detail.pointerEventHandler,[...detail.pointerEventHandler.pointers.values()],detail.multiPointer,detail.metrics,detail.totalMetrics);

            target.addEventListener('multipointermove.peh',(event)=>{
                showOutput(event)
                const detail = event.detail;
                console.log(event.type,detail.pointerEventHandler,[...detail.pointerEventHandler.pointers.values()],detail.multiPointer,detail.metrics,detail.totalMetrics);
            })

                showOutput(event)
                const detail = event.detail;

            target.addEventListener('multipointercancel.peh',(event)=>{

            })
            target.addEventListener('multipointerleave.peh',(event)=>{
                showOutput(event)
                const detail = event.detail;
                console.log(event.type,detail.pointerEventHandler,[...detail.pointerEventHandler.pointers.values()],detail.multiPointer,detail.metrics,detail.totalMetrics);
            })




            target.addEventListener('gesturestart.peh',(event)=>{
                showOutput(event)
                const detail = event.detail;
                console.log(event.type,detail.multiPointer,detail.metrics,detail.totalMetrics);
            })
            target.addEventListener('gesturechange.peh',(event)=>{
                showOutput(event)
                const detail = event.detail;
                console.log(event.type,detail.multiPointer,detail.metrics,detail.totalMetrics);
            })
            target.addEventListener('gestureend.peh',(event)=>{
                showOutput(event)
                const detail = event.detail;
                console.log(event.type,detail.multiPointer,detail.metrics,detail.totalMetrics);
            })

            target.addEventListener('pinch.peh',(event)=>{
                showOutput(event)
                const detail = event.detail;
                console.log(event.type,detail.multiPointer,detail.metrics,detail.totalMetrics);
            })


            target.addEventListener('rotate.peh',(event)=>{
                showOutput(event)
                const detail = event.detail;
                console.log(event.type,detail.multiPointer,detail.metrics,detail.totalMetrics);
